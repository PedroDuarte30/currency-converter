<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <title>Currency Converter</title>
  </head>
  <body>
    <header>
      <h1>Currency Converter</h1>
    </header>
    <main>
      <section class="container">
        <form id="converter-form" class="converter">
          <div class="field">
            <label for="amount">Value to convert:</label>
            <input
              type="number"
              id="amount"
              placeholder="Insert the value"
              required
              step="0.01"
            />
          </div>

          <div class="currency-group">
            <div class="field">
              <label for="source-currency">From:</label>
              <select id="source-currency">
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="BRL">Real (BRL)</option>
              </select>
            </div>

            <div class="field">
              <label for="target-currency">To:</label>
              <select id="target-currency">
                <option value="EUR">Euro (EUR)</option>
                <option value="USD">Dólar (USD)</option>
                <option value="BRL">Real (BRL)</option>
              </select>
            </div>
          </div>

          <button type="submit">Convert</button>

          <p id="result-display"></p>
        </form>
      </section>
    </main>
    <footer>
      <p>Data provided by: Exchange Rate API</p>
    </footer>
     <script src="src/js/main.js"></script>
  </body>
</html>
